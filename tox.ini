[tox]
envlist = py314, lint, type, security
isolated_build = true
skip_missing_interpreters = false

# =============================================================================
# Test Environment
# =============================================================================
[testenv]
description = Run tests with pytest
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests/} --cov=hello_world --cov-report=term-missing --cov-report=xml

# =============================================================================
# Quality Check Environments
# =============================================================================
[testenv:lint]
description = Run linting with ruff
skip_install = true
deps =
    ruff
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:type]
description = Run type checking with mypy
deps =
    mypy
commands =
    mypy src/

[testenv:security]
description = Run security checks with bandit
skip_install = true
deps =
    bandit[toml]
commands =
    bandit -r src/ -c pyproject.toml

# =============================================================================
# Build Environment
# =============================================================================
[testenv:build]
description = Build package (wheel and sdist)
skip_install = true
deps =
    build
    twine
commands =
    python -m build
    twine check dist/*

# =============================================================================
# Convenience: Run all checks at once
# =============================================================================
[testenv:all]
description = Run all checks (lint, type, security, test)
deps =
    pytest
    pytest-cov
    ruff
    mypy
    bandit[toml]
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/
    mypy src/
    bandit -r src/ -c pyproject.toml
    pytest tests/ --cov=hello_world --cov-report=term-missing
