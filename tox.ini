[tox]
envlist = py314, lint, type, security
isolated_build = true
skip_missing_interpreters = false

# =============================================================================
# Test Environment
# =============================================================================
[testenv]
description = Run tests with pytest
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests/} --cov=hello_world --cov-report=term-missing --cov-report=xml

# =============================================================================
# Quality Check Environments
# =============================================================================
[testenv:lint]
description = Same quality hooks as CI (pre-commit; pytest skipped)
skip_install = false
extras = dev
setenv =
    SKIP=pytest
commands =
    pre-commit run --all-files

[testenv:type]
description = Run type checking with mypy
deps =
    mypy
commands =
    mypy src/

[testenv:security]
description = Run security checks with bandit
skip_install = true
deps =
    bandit[toml]
commands =
    bandit -r src/ -c pyproject.toml

# =============================================================================
# Build Environment
# =============================================================================
[testenv:build]
description = Build package (wheel and sdist)
skip_install = true
deps =
    build
    twine
commands =
    python -m build
    twine check dist/*

# =============================================================================
# Convenience: Run all checks at once
# =============================================================================
[testenv:all]
description = Pre-commit (skip pytest) + pytest with coverage (like CI)
skip_install = false
extras = dev
setenv =
    SKIP=pytest
commands =
    pre-commit run --all-files
    pytest tests/ --cov=hello_world --cov-report=term-missing --cov-report=xml
