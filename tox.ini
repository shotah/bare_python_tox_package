[tox]
envlist = py314, lint, type, security
isolated_build = true
skip_missing_interpreters = false

[testenv]
description = Run tests with pytest
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests/} --cov=hello_world --cov-report=term-missing --cov-report=xml

[testenv:lint]
description = Run linting with ruff
skip_install = true
deps =
    ruff
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:type]
description = Run type checking with mypy
deps =
    mypy
commands =
    mypy src/

[testenv:security]
description = Run security checks with bandit
skip_install = true
deps =
    bandit[toml]
commands =
    bandit -r src/ -c pyproject.toml

[testenv:build]
description = Build package (wheel and sdist)
skip_install = true
deps =
    build
    twine
commands =
    python -m build
    twine check dist/*

[testenv:clean]
description = Clean build artifacts
skip_install = true
allowlist_externals = rm
commands =
    rm -rf dist/ build/ *.egg-info src/*.egg-info .pytest_cache .mypy_cache .ruff_cache coverage.xml .coverage

# Shared settings
[testenv:dev]
description = Development environment with all tools
deps =
    pytest
    pytest-cov
    ruff
    mypy
    bandit[toml]
    build
    twine
commands =
    pytest tests/ -v
