name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# PRs: read-only is enough. Pushes to main need write for gh-pages badge deploy.
permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Mirrors .pre-commit-config.yaml (pyupgrade, ruff, mypy, bandit, hooks, …).
      # Skip embedded pytest here — next step runs pytest with coverage for the badge.
      - name: Pre-commit
        run: SKIP=pytest pre-commit run --all-files

      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=hello_world \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Build distributions
        run: |
          python -m build
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Create badges directory
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: mkdir -p badges

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          rate=$(sed -n 's/.*line-rate="\([^"]*\)".*/\1/p' coverage.xml | head -1)
          pct=$(awk "BEGIN {printf \"%.0f\", (${rate:-0}) * 100}")
          if   [ "$pct" -ge 80 ]; then color="#4c1"
          elif [ "$pct" -ge 60 ]; then color="#97ca00"
          elif [ "$pct" -ge 40 ]; then color="#a4a61d"
          else color="#e05d44"
          fi
          cat > badges/coverage.svg <<BADGE_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <svg xmlns="http://www.w3.org/2000/svg" width="99" height="20">
            <linearGradient id="b" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <mask id="a">
              <rect width="99" height="20" rx="3" fill="#fff"/>
            </mask>
            <g mask="url(#a)">
              <path fill="#555" d="M0 0h63v20H0z"/>
              <path fill="${color}" d="M63 0h36v20H63z"/>
              <path fill="url(#b)" d="M0 0h99v20H0z"/>
            </g>
            <g fill="#fff" text-anchor="middle"
               font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="31.5" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="31.5" y="14">coverage</text>
              <text x="80" y="15" fill="#010101" fill-opacity=".3">${pct}%</text>
              <text x="80" y="14">${pct}%</text>
            </g>
          </svg>
          BADGE_EOF

      - name: Push badge to gh-pages branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: badges
          keep_files: true
          destination_dir: badges
