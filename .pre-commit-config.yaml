# Keep revisions fresh: run `pre-commit autoupdate` (or `make hooks-update`), then commit.
# Ruff also enables rule set UP (pyupgrade) in pyproject.toml; this hook rewrites sources first.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
        exclude: \.vscode/ # VS Code JSON supports comments, standard JSON doesn't
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        # Latest pyupgrade tag has --py311-plus max; aligns with Ruff target py312 + package >=3.12
        args: [--py311-plus]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pytest
        args: [--config-file=pyproject.toml]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pipenv run pytest tests/ -v
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
